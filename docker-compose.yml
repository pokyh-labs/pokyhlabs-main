services:

  # ── Unified App (Next.js + Express on one port) ───────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SQLITE_PATH: /app/data/database.sqlite
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/backend/logs
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/api/blogs"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqlite_data:
