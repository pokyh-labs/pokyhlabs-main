services:

  # ── Unified App (Next.js + Express on one port) ───────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SQLITE_PATH: /app/data/database.sqlite
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/logs
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/api/blogs"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Cloudflare Tunnel (optional, aktivieren mit --profile tunnel) ──
  cloudflared:
    image: cloudflare/cloudflared:2025.1.1
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - tunnel

volumes:
  sqlite_data:
