services:

  # ── MySQL Datenbank ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-pokyhlabs}
      MYSQL_USER: ${DB_USER:-pokyhlabs_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme_root_CHANGE_ME}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-changeme_root_CHANGE_ME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Express Backend API ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      NODE_ENV: production
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3001}/api/blogs"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001/api}
    depends_on:
      - backend

  # ── Cloudflare Tunnel (optional, aktivieren mit --profile tunnel) ──
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - tunnel

volumes:
  mysql_data:
