<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog – pokyh.studio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root { --accent: #6c47ff; --bg: #0f0f14; --bg2: #1a1a2e; --border: #2d2d4e; --text: #e2e8f0; --text2: #94a3b8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    header { border-bottom: 1px solid var(--border); padding: 1rem 0; background: var(--bg2); }
    .container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
    header .inner { display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.25rem; color: var(--text); }
    nav a { color: var(--text2); margin-left: 1.5rem; font-size: 0.875rem; }
    nav a:hover { color: var(--text); }
    main { padding: 3rem 0; }
    h2 { font-size: 1.75rem; margin-bottom: 0.5rem; color: var(--text); }
    .subtitle { color: var(--text2); margin-bottom: 2.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color .2s, transform .2s; cursor: pointer; }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-img { width: 100%; height: 180px; object-fit: cover; background: #12122a; display: flex; align-items: center; justify-content: center; color: var(--border); font-size: 3rem; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 1.25rem; }
    .card-title { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; line-height: 1.4; }
    .card-excerpt { color: var(--text2); font-size: 0.875rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; font-size: 0.8rem; color: #6b7280; }
    .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 3rem; }
    .pagination button { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 0.4rem 0.9rem; border-radius: 8px; cursor: pointer; }
    .pagination button.active, .pagination button:hover { border-color: var(--accent); color: var(--text); }
    .post-view { max-width: 720px; margin: 0 auto; }
    .post-hero img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 14px; margin-bottom: 2rem; }
    .post-title { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
    .post-meta { color: var(--text2); font-size: 0.875rem; margin-bottom: 2rem; display: flex; gap: 1.5rem; }
    .post-content { color: var(--text2); line-height: 1.8; }
    .post-content h1,.post-content h2,.post-content h3 { color: var(--text); margin: 2rem 0 1rem; }
    .post-content p { margin-bottom: 1rem; }
    .post-content ul,.post-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .post-content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: #818cf8; margin: 1.5rem 0; }
    .post-content code { background: #12122a; padding: 0.1rem 0.4rem; border-radius: 4px; font-family: monospace; font-size: 0.875em; }
    .post-content pre { background: #12122a; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; }
    .post-content a { color: var(--accent); }
    .back-btn { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 0.4rem 0.9rem; border-radius: 8px; cursor: pointer; margin-bottom: 2rem; font-size: 0.875rem; }
    .back-btn:hover { border-color: var(--accent); color: var(--text); }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(108,71,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 4rem 0; color: #6b7280; }
    .empty i { font-size: 3rem; display: block; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="inner">
        <h1>pokyh.studio</h1>
        <nav>
          <a href="/">Home</a>
          <a href="/blog">Blog</a>
          <a href="/admin" style="color: var(--accent);">Admin</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div id="list-view">
        <h2>Blog</h2>
        <p class="subtitle">Artikel, Gedanken & Neuigkeiten</p>
        <div id="loading" style="text-align:center; padding:4rem 0;">
          <span class="spinner"></span>
        </div>
        <div id="grid" class="grid" style="display:none;"></div>
        <div id="empty" class="empty" style="display:none;">
          <i class="bi bi-journal-x"></i>
          <p>Noch keine veröffentlichten Beiträge.</p>
        </div>
        <div id="pagination" class="pagination"></div>
      </div>

      <div id="post-view" style="display:none;">
        <button class="back-btn" onclick="backToList()">
          <i class="bi bi-arrow-left" style="margin-right:6px;"></i>Zurück
        </button>
        <div class="post-view">
          <div id="post-hero" class="post-hero"></div>
          <h1 id="post-title" class="post-title"></h1>
          <div id="post-meta" class="post-meta"></div>
          <div id="post-content" class="post-content"></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    let currentPage = 1;
    const limit = 9;

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadBlogs(page = 1) {
      currentPage = page;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('grid').style.display = 'none';
      document.getElementById('empty').style.display = 'none';

      try {
        const res = await fetch(`/api/blogs?page=${page}&limit=${limit}`);
        const data = await res.json();
        renderBlogs(data.blogs, data.pagination);
      } catch {
        document.getElementById('empty').style.display = 'block';
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function renderBlogs(blogs, pagination) {
      if (!blogs.length) {
        document.getElementById('empty').style.display = 'block';
        return;
      }
      document.getElementById('grid').style.display = 'grid';
      document.getElementById('grid').innerHTML = blogs.map(b => `
        <div class="card" onclick="loadPost('${escHtml(b.slug)}')">
          <div class="card-img">${b.image_url
            ? `<img src="${escHtml(b.image_url)}" alt="${escHtml(b.image_alt||b.title)}" loading="lazy">`
            : '<i class="bi bi-journal-text"></i>'
          }</div>
          <div class="card-body">
            <div class="card-title">${escHtml(b.title)}</div>
            ${b.excerpt ? `<p class="card-excerpt">${escHtml(b.excerpt)}</p>` : ''}
            <div class="card-meta">
              <span><i class="bi bi-person" style="margin-right:4px;"></i>${escHtml(b.author?.username||'')}</span>
              <span><i class="bi bi-calendar3" style="margin-right:4px;"></i>${b.published_at ? new Date(b.published_at).toLocaleDateString('de-DE') : ''}</span>
              <span><i class="bi bi-eye" style="margin-right:4px;"></i>${b.views||0}</span>
            </div>
          </div>
        </div>
      `).join('');

      const pages = pagination?.pages || 1;
      const pag = document.getElementById('pagination');
      pag.innerHTML = '';
      for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        if (i === currentPage) btn.classList.add('active');
        btn.onclick = () => loadBlogs(i);
        pag.appendChild(btn);
      }
    }

    async function loadPost(slug) {
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('post-view').style.display = 'block';
      document.getElementById('post-content').innerHTML = '<div style="text-align:center;padding:3rem 0;"><span class="spinner"></span></div>';
      window.scrollTo(0, 0);

      try {
        const res = await fetch(`/api/blogs/${encodeURIComponent(slug)}`);
        const b = await res.json();
        if (!res.ok) throw new Error(b.error || 'Nicht gefunden');
        document.title = `${b.title} – pokyh.studio`;
        document.getElementById('post-hero').innerHTML = b.image_url
          ? `<img src="${escHtml(b.image_url)}" alt="${escHtml(b.image_alt||b.title)}">`
          : '';
        document.getElementById('post-title').textContent = b.title;
        document.getElementById('post-meta').innerHTML = `
          <span><i class="bi bi-person" style="margin-right:4px;"></i>${escHtml(b.author?.username||'')}</span>
          <span><i class="bi bi-calendar3" style="margin-right:4px;"></i>${b.published_at ? new Date(b.published_at).toLocaleDateString('de-DE', {day:'2-digit',month:'long',year:'numeric'}) : ''}</span>
          <span><i class="bi bi-eye" style="margin-right:4px;"></i>${b.views||0} Views</span>
        `;
        // Content is already sanitized by the backend with sanitize-html
        document.getElementById('post-content').innerHTML = b.content;
      } catch (e) {
        document.getElementById('post-content').innerHTML = `<p style="color:#f87171;">Fehler: ${escHtml(e.message)}</p>`;
      }
    }

    function backToList() {
      document.getElementById('post-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'block';
      document.title = 'Blog – pokyh.studio';
      window.scrollTo(0, 0);
    }

    loadBlogs();
  </script>
</body>
</html>
